server {
    listen 80;
    server_name localhost;

    # ── Serve React static files ─────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # React Router: all unknown routes → index.html
    # (so /download-page doesn't 404 on refresh)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy: HTTP API → Node.js server ────────────────────
    # Any request to /download is forwarded to the backend
    location /download {
        proxy_pass http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Increase timeout for long downloads
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Proxy: WebSocket → Node.js server ───────────────────
    # WebSocket upgrade headers are required
    location /ws {
        proxy_pass http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;  # keep WS alive for long downloads
    }

    # ── Caching for static assets ────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
}
